name: FeedYu
options:
  bundleIdPrefix: com.yuyu
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  FeedYu:
    type: application
    platform: iOS
    sources:
      - FeedYu
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 84336L2H62
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: FeedYu/Info.plist
      properties:
        NSLocationWhenInUseUsageDescription: FeedYu uses your location to suggest restaurants within your drive-time budget.
        LSApplicationQueriesSchemes: [comgooglemaps]
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false

  FeedYuTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FeedYuTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: FeedYu

schemes:
  FeedYu:
    build:
      targets:
        FeedYu: all
        FeedYuTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FeedYuTests
