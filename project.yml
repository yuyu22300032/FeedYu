name: DinePick
options:
  bundleIdPrefix: com.yuyu
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  DinePick:
    type: application
    platform: iOS
    sources:
      - DinePick
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 84336L2H62
    info:
      path: DinePick/Info.plist
      properties:
        NSLocationWhenInUseUsageDescription: DinePick uses your location to suggest restaurants within your drive-time budget.
        LSApplicationQueriesSchemes: [comgooglemaps]
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false

  DinePickTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - DinePickTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: DinePick

schemes:
  DinePick:
    build:
      targets:
        DinePick: all
        DinePickTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - DinePickTests
