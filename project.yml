name: FeedYu
options:
  bundleIdPrefix: com.yuyu
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "2"

targets:
  FeedYu:
    type: application
    platform: iOS
    sources:
      - FeedYu
    dependencies:
      - target: FeedYuShare
    entitlements:
      path: FeedYu/FeedYu.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.yuyu.FeedYu
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 84336L2H62
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: FeedYu/Info.plist
      properties:
        NSLocationWhenInUseUsageDescription: FeedYu uses your location to suggest restaurants within your drive-time budget.
        LSApplicationQueriesSchemes: [comgooglemaps]
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false

  # Share-sheet target: lets Google Maps "Share list" send links straight to
  # the app (via the ShareInbox app-group hand-off).
  FeedYuShare:
    type: app-extension
    platform: iOS
    sources:
      - FeedYuShare
      - FeedYu/Support/ShareInbox.swift
    entitlements:
      path: FeedYuShare/FeedYuShare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.yuyu.FeedYu
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 84336L2H62
        PRODUCT_BUNDLE_IDENTIFIER: com.yuyu.FeedYu.Share
    info:
      path: FeedYuShare/Info.plist
      properties:
        CFBundleDisplayName: FeedYu
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true

  FeedYuTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FeedYuTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: FeedYu

  FeedYuUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - FeedYuUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: FeedYu
    dependencies:
      - target: FeedYu

schemes:
  FeedYu:
    build:
      targets:
        FeedYu: all
        FeedYuTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FeedYuTests

  # UI-test target scheme: the App Preview demo choreography AND the
  # view-wiring contract tests (SuggestionContractUITests — run via
  # -only-testing, see docs/REQUIREMENTS.md). Its own scheme so the
  # everyday unit-test command never pays for app launches.
  FeedYuDemo:
    build:
      targets:
        FeedYu: all
        FeedYuUITests: [test]
    test:
      config: Debug
      targets:
        - FeedYuUITests
